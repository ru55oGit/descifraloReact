[build]
  # Comando de build
  command = "npm run build"
  # Directorio de output
  publish = "build"

[build.environment]
  # Node version para consistencia
  NODE_VERSION = "18"

# Configuración para SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers para optimización
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Deshabilitar prerendering legacy explícitamente
[build.processing]
  skip_processing = false

# Configuración para React Router
[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true